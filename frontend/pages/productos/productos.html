<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Padel Nuestro</title>
    <link rel="stylesheet" href="/CSS/styles.css">
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
</head>
<body>
    <header></header>

    <main>
        <h1 class="titulocategorias">TODOS NUESTROS PRODUCTOS</h1>
        <h3 class="subtitulocategorias">Filtrá por categoría o buscá por nombre. Envío gratis a todo el país.</h3>

        <section class="buscador-section">
            <input class="buscadorProductos"
                type="text"
                id="buscador"
                placeholder="Buscar productos..."
            />
        </section>

        <div id="filtroContainer"></div>

        <p id="estado" class="estado-carga">Cargando productos...</p>

        <div class="cardContainer" id="cardContainer"></div>
    </main>

    <footer></footer>

    <script type="module" src="/index.js"></script>
    <script type="module" src="/pages/productos/productos.js"></script>
</body>
</html>
